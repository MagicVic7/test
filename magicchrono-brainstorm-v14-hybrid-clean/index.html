<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Magic Chrono - Brain Storm Hybrid V14</title>
<meta name="theme-color" content="#6f1d8f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Magic Chrono">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<style>
:root{--bg:#f8f5fb;--purple:#6f1d8f;--purple-light:#c985e8;--grey:#dedee3;--grey-dark:#9d9da1;--red:#e3322b;--muted:#a996ae;--dark:#101010}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
html,body{width:100%;height:100%;overflow:hidden;background:#000}.hidden{display:none!important}.screen{position:absolute;inset:0;width:100vw;height:100vh;overflow:hidden}.scroll{overflow:auto}
#hubScreen{padding:64px 20px 28px;background:radial-gradient(circle at 50% -10%,#4e1768 0%,#17101d 42%,#07070a 100%);color:#fff}.hub-title{font-size:34px;font-weight:900}.hub-sub{margin:8px 0 28px;color:rgba(255,255,255,.62)}.tour-grid{display:grid;gap:14px}.tour-btn{min-height:86px;border:0;border-radius:24px;padding:18px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,#2a2033,#181720);color:white;text-align:left;box-shadow:0 12px 28px rgba(0,0,0,.25)}.tour-name{font-size:22px;font-weight:900}.tour-desc{display:block;margin-top:5px;color:rgba(255,255,255,.58);font-size:13px;font-weight:600}.tour-icon{width:48px;height:48px;border-radius:16px;display:flex;align-items:center;justify-content:center;background:var(--purple-light);font-size:24px;font-weight:900}.hub-footer{margin-top:22px;color:rgba(255,255,255,.35);font-size:12px;text-align:center}
#pinScreen{background:radial-gradient(circle at 50% 12%,#bba0cd 0%,#9f82b0 37%,#80698f 100%);color:#fff}.pin-panel{position:absolute;top:263px;left:0;width:100%;display:flex;flex-direction:column;align-items:center}.pin-title{max-width:340px;margin-bottom:9px;text-align:center;font-size:18px;font-weight:800;color:rgba(255,255,255,.96);line-height:1.25;text-shadow:0 1px 1px rgba(0,0,0,.08)}.pin-sub{max-width:350px;min-height:34px;margin-bottom:18px;text-align:center;font-size:13px;font-weight:700;color:rgba(255,255,255,.88);line-height:1.25}.pin-dots{height:11px;margin-bottom:18px;display:flex;gap:9px}.dot{width:8px;height:8px;border:1.5px solid rgba(255,255,255,.78);border-radius:50%}.dot.full{background:white;border-color:white}#keypad{width:272px;display:grid;grid-template-columns:repeat(3,1fr);column-gap:25px;row-gap:16px;justify-items:center}.key{width:68px;height:68px;border:0;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-direction:column;background:rgba(255,255,255,.18);color:white;font-size:28px}.key small{font-size:8px;font-weight:800;margin-top:5px}.pin-ok,.pin-back{background:transparent!important;box-shadow:none!important}.pin-ok{font-size:20px!important;color:rgba(255,255,255,.58)!important}.pin-back{font-size:24px!important;color:rgba(255,255,255,.88)!important}.emergency-btn{position:absolute;bottom:72px;left:50%;transform:translateX(-50%);border:0;border-radius:999px;padding:11px 23px;background:rgba(255,255,255,.2);color:white;font-size:14px;font-weight:800;white-space:nowrap}
#timerScreen{background:var(--bg);color:var(--purple)}.statusbar{position:absolute;top:16px;left:0;width:100%;height:18px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;color:#66666d;font-size:11px;font-weight:700;opacity:.92}.status-icons{display:flex;align-items:center;gap:4px}.battery-bubble{width:22px;height:18px;border-radius:999px;display:flex;align-items:center;justify-content:center;background:#7f7f86;color:white;font-size:10px;font-weight:850;margin-left:1px}.timer{position:absolute;top:238px;left:0;width:100%;text-align:center;font-size:52px;font-weight:800;letter-spacing:3.2px;font-variant-numeric:tabular-nums;white-space:nowrap}.laps{position:absolute;top:315px;left:42px;right:42px;max-height:205px;overflow:hidden;font-size:16px;font-weight:650}.lap-row{display:flex;justify-content:space-between;border-bottom:1px solid rgba(111,29,143,.13);padding:8px 0}.lap-name{color:var(--muted)}.controls{position:absolute;left:0;bottom:122px;width:100%;display:flex;justify-content:center;gap:36px}.btn{width:138px;height:52px;border:0;border-radius:999px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800}.btn-left{background:var(--grey);color:#111}.btn-left.disabled{background:var(--grey-dark);color:#5d5d61}.btn-start{background:var(--purple-light);color:white}.btn-stop{background:var(--red);color:white}.kebab{position:absolute;top:70px;right:31px;width:10px;height:28px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:4px;opacity:.9}.kebab span{width:3px;height:3px;border-radius:50%;background:var(--purple)}.home-indicator{position:absolute;left:50%;bottom:6px;transform:translateX(-50%);width:135px;height:4px;border-radius:999px;background:#9d9ca0}.bottom-nav{position:absolute;left:0;bottom:21px;width:100%;height:62px;display:grid;grid-template-columns:repeat(4,1fr);align-items:end;color:var(--muted)}.nav-item{display:flex;flex-direction:column;align-items:center;gap:5px;font-size:13px}.nav-item.active{color:var(--purple);font-weight:850}.nav-dot{font-size:23px}.small-back{position:absolute;top:18px;left:16px;z-index:20;border:0;border-radius:999px;padding:10px 14px;background:rgba(255,255,255,.12);color:#fff;font-weight:800}
#quitZone{position:fixed;top:0;left:0;width:80px;height:80px;z-index:30}@media(max-width:370px){.timer{font-size:48px;letter-spacing:2.4px}.controls{gap:22px}.btn{width:132px}.laps{left:30px;right:30px}}
</style>
</head>
<body>
<main id="hubScreen" class="screen scroll"><h1 class="hub-title">Magic Chrono</h1><p class="hub-sub">Choisis un tour.</p><section class="tour-grid"><button class="tour-btn" onclick="openBrainHybridPin()"><span><span class="tour-name">Brain Storm</span><span class="tour-desc">API si disponible, secours manuel sinon</span></span><span class="tour-icon">🧠</span></button></section><footer class="hub-footer">www.magicvictor.be · Hybrid V14</footer></main>
<section id="pinScreen" class="screen hidden"><div class="pin-panel"><div class="pin-title">Entrez le code PIN</div><div class="pin-sub">Lecture Brain Storm...</div><div id="pinDots" class="pin-dots"></div><div id="keypad"></div></div><button id="emergencyBtn" class="emergency-btn" type="button">Appel d'urgence</button></section>
<section id="timerScreen" class="screen hidden"><div id="quitZone"></div><div class="statusbar"><div><span id="phoneTime">14:10</span></div><div class="status-icons"><span>⌁</span><span>▂▅▇</span><span>4G</span><span class="battery-bubble" id="batteryText">0</span></div></div><div class="kebab"><span></span><span></span><span></span></div><div class="timer" id="timer">00 : 00, 00</div><div class="laps" id="laps"></div><div class="controls"><button class="btn btn-left disabled" id="resetBtn">Tour</button><button class="btn btn-start" id="startBtn">Démarrer</button></div><nav class="bottom-nav"><div class="nav-item"><span class="nav-dot">⏰</span><span>Alarme</span></div><div class="nav-item"><span class="nav-dot">🌐</span><span>Horloge Mond</span></div><div class="nav-item active"><span class="nav-dot">⏱</span><span>Chronomètre</span></div><div class="nav-item"><span class="nav-dot">⌛</span><span>Minuteur</span></div></nav><div class="home-indicator"></div></section>
<script>
var API_URL='https://www.memorytraining.fr/api/peeksmith?token=TUVNTy1FVVdBLVE3NjQ=';
var KEYPAD_DATA=[["1",""],["2","ABC"],["3","DEF"],["4","GHI"],["5","JKL"],["6","MNO"],["7","PQRS"],["8","TUV"],["9","WXYZ"],["⌫",""],["0",""],["OK",""]];
var state={pin:'',brainMode:'loading',brainManualBirthdayMode:false,brainPosition:0,brainHasPosition:false,brainHasBirthday:false,brainBirthdayParts:[],brainLapIndex:0,brainError:'',brainTimeUpdated:'',running:false,elapsed:0,startTime:0,interval:null,laps:[],lastForcedTime:'00 : 00, 00'};
function $(s){return document.querySelector(s)}function $$(s){return document.querySelectorAll(s)}
function hideAll(){for(var s of $$('.screen'))s.classList.add('hidden')}function show(id){hideAll();$(id).classList.remove('hidden')}
function openHub(){show('#hubScreen')}
function pinLength(){return state.brainMode==='manual'&&state.brainManualBirthdayMode?6:4}
function renderDots(){setPinCopy();var box=$('#pinDots');box.innerHTML='';for(var i=0;i<pinLength();i++){var d=document.createElement('span');d.className='dot';if(i<state.pin.length)d.classList.add('full');box.appendChild(d)}}
function setPinCopy(){var sub=document.querySelector('.pin-sub');document.querySelector('.pin-title').innerText='Entrez le code PIN';if(state.brainMode==='loading'){sub.innerText='Lecture Brain Storm...';return}if(state.brainMode==='api'){var txt=state.brainHasBirthday?'Votre code annif contient au moins 4 chiffres.':'Votre code position contient au moins 4 chiffres.';txt+=' TP='+state.brainPosition;if(state.brainHasBirthday)txt+=' · '+twoDigit(state.brainBirthdayParts[0])+'/'+twoDigit(state.brainBirthdayParts[1]);if(state.brainTimeUpdated)txt+=' · '+state.brainTimeUpdated;sub.innerText=txt;return}if(state.brainMode==='manual'){sub.innerText=state.brainManualBirthdayMode?'API vide - code annif : PPJJMM.':'API vide - code position : PPxx.';return}sub.innerText='Erreur API - secours manuel : PPxx.'}
function buildKeypad(){var k=$('#keypad');k.innerHTML='';KEYPAD_DATA.forEach(function(x){var key=x[0],letters=x[1];var b=document.createElement('button');b.type='button';b.className='key';b.innerHTML=letters?key+'<small>'+letters+'</small>':key;if(key==='⌫')b.classList.add('pin-back');if(key==='OK')b.classList.add('pin-ok');b.onclick=function(){if(key==='OK'){if(state.pin.length===pinLength())processPin()}else pressKey(key)};k.appendChild(b)})}
function pressKey(k){if(k==='⌫'){state.pin=state.pin.slice(0,-1);renderDots();return}if(!/^\d$/.test(k)||state.pin.length>=pinLength())return;state.pin+=k;renderDots();if(state.pin.length===pinLength())setTimeout(processPin,100)}
function resetPin(){state.pin='';renderDots()}
function openBrainHybridPin(){state.pin='';state.brainMode='loading';state.brainManualBirthdayMode=false;state.brainPosition=0;state.brainHasPosition=false;state.brainHasBirthday=false;state.brainBirthdayParts=[];state.brainLapIndex=0;state.brainError='';state.brainTimeUpdated='';show('#pinScreen');resetPin();fetchBrainHybrid()}
function twoDigit(n){return String(Math.max(0,Math.min(99,Number(n)||0))).padStart(2,'0')}
function parseNum(v){v=String(v==null?'':v).trim();if(!v)return null;var n=Number(v);return Number.isFinite(n)?Math.round(n):null}
function parseBirthday(v){v=String(v==null?'':v).trim();if(!v)return null;var m=v.match(/^\(?\s*(\d{1,2})\s*[\/\-. ]\s*(\d{1,2})\s*\)?$/);if(!m)return null;var d=Number(m[1]),mo=Number(m[2]);return d>=1&&d<=31&&mo>=1&&mo<=12?[d,mo]:null}
function parseBirthdayFromText(v){v=String(v==null?'':v);var m=v.match(/\(\s*(\d{1,2})\s*[\/\-. ]\s*(\d{1,2})\s*\)/);if(!m)return null;var d=Number(m[1]),mo=Number(m[2]);return d>=1&&d<=31&&mo>=1&&mo<=12?[d,mo]:null}
function fetchBrainHybrid(done){state.brainMode='loading';renderDots();var url=API_URL+'&_t='+Date.now()+'&r='+Math.random().toString(36).slice(2);fetch(url,{cache:'no-store'}).then(function(r){if(!r.ok)throw Error('HTTP '+r.status);return r.text()}).then(function(raw){var obj=JSON.parse(raw);var n=parseNum(obj.TargetPosition);var has=n!==null&&n>0&&n<=99;var b=parseBirthday(obj.birthday)||parseBirthdayFromText(obj.full_peek)||parseBirthdayFromText(obj.text);state.brainPosition=has?n:0;state.brainHasPosition=has;state.brainHasBirthday=!!b;state.brainBirthdayParts=b||[];state.brainTimeUpdated=String(obj.timeUpdated||'');state.brainMode=has?'api':'manual';updateStatusBar();renderDots();if(done)done()}).catch(function(e){state.brainError=String(e&&e.message?e.message:e);state.brainMode='manual';state.brainPosition=0;state.brainHasPosition=false;state.brainHasBirthday=false;state.brainBirthdayParts=[];updateStatusBar();renderDots();if(done)done()})}
function toggleBrainHybridManualMode(){if(state.brainMode==='api'){fetchBrainHybrid(function(){resetPin();renderDots()});return}state.brainMode='manual';state.brainManualBirthdayMode=!state.brainManualBirthdayMode;resetPin();renderDots()}
function processPin(){var code=state.pin;if(state.brainMode==='api'){enterTimer();return}if(state.brainManualBirthdayMode){var pp=Number(code.slice(0,2)),jj=Number(code.slice(2,4)),mm=Number(code.slice(4,6));if(pp<1||pp>99||jj<1||jj>31||mm<1||mm>12){alert('Format attendu PPJJMM, ex : 392906.');resetPin();return}state.brainPosition=pp;state.brainHasPosition=true;state.brainHasBirthday=true;state.brainBirthdayParts=[jj,mm];enterTimer();return}var p=Number(code.slice(0,2));if(p<1||p>99){alert('Position invalide. Format PPxx, ex : 3900.');resetPin();return}state.brainPosition=p;state.brainHasPosition=true;state.brainHasBirthday=false;state.brainBirthdayParts=[];enterTimer()}
function enterTimer(){state.laps=[];state.elapsed=0;state.running=false;state.brainLapIndex=0;clearInterval(state.interval);updateStatusBar();updateDisplay();renderLaps();$('#startBtn').innerText='Démarrer';$('#startBtn').classList.remove('btn-stop');$('#startBtn').classList.add('btn-start');$('#resetBtn').innerText='Tour';$('#resetBtn').classList.add('disabled');show('#timerScreen')}
function parts(ms){return{min:Math.floor(ms/60000),sec:Math.floor(ms/1000)%60,cs:Math.floor((ms%1000)/10)}}
function fmt(ms){var t=parts(ms);return String(t.min).padStart(2,'0')+' : '+String(t.sec).padStart(2,'0')+', '+String(t.cs).padStart(2,'0')}
function updateDisplay(){$('#timer').innerText=fmt(state.elapsed)}function updateStatusBar(){$('#batteryText').innerText=state.brainPosition||0}
function forcedNumber(ms,target){var t=parts(ms),cs;(t.min+t.sec)<=target?cs=target-t.min-t.sec:cs=target;cs=Math.max(0,Math.min(99,cs));return{milliseconds:t.min*60000+t.sec*1000+cs*10,text:String(t.min).padStart(2,'0')+' : '+String(t.sec).padStart(2,'0')+', '+String(cs).padStart(2,'0')}}
function forceCentiseconds(ms,cs){var t=parts(ms);cs=Math.max(0,Math.min(99,Number(cs)||0));return{milliseconds:t.min*60000+t.sec*1000+cs*10,text:String(t.min).padStart(2,'0')+' : '+String(t.sec).padStart(2,'0')+', '+String(cs).padStart(2,'0')}}
function startTimer(){state.running=true;state.startTime=Date.now()-state.elapsed;state.interval=setInterval(function(){state.elapsed=Date.now()-state.startTime;updateDisplay()},16);$('#startBtn').innerText='Arrêter';$('#startBtn').classList.remove('btn-start');$('#startBtn').classList.add('btn-stop');$('#resetBtn').innerText='Tour';$('#resetBtn').classList.remove('disabled')}
function stopTimer(){state.running=false;clearInterval(state.interval);var f=forcedNumber(state.elapsed,state.brainPosition);state.elapsed=f.milliseconds;state.lastForcedTime=f.text;$('#timer').innerText=f.text;$('#startBtn').innerText='Reprendre';$('#startBtn').classList.remove('btn-stop');$('#startBtn').classList.add('btn-start');$('#resetBtn').innerText='Réinitialis.'}
function addLap(){var lap={milliseconds:state.elapsed,text:fmt(state.elapsed),type:'normal'};if(state.brainHasBirthday&&state.brainLapIndex<state.brainBirthdayParts.length){lap=forceCentiseconds(state.elapsed,state.brainBirthdayParts[state.brainLapIndex]);state.brainLapIndex++}state.laps.push(lap);renderLaps()}
function resetTimer(){if(state.running){addLap();return}state.elapsed=0;state.laps=[];state.brainLapIndex=0;renderLaps();updateDisplay();$('#startBtn').innerText='Démarrer';$('#startBtn').classList.remove('btn-stop');$('#startBtn').classList.add('btn-start');$('#resetBtn').innerText='Tour';$('#resetBtn').classList.add('disabled')}
function renderLaps(){var box=$('#laps');box.innerHTML='';state.laps.slice(-5).reverse().forEach(function(l,i){var r=document.createElement('div');r.className='lap-row';r.innerHTML='<span class="lap-name">Tour '+(state.laps.length-i)+'</span><span>'+l.text+'</span>';box.appendChild(r)})}
function updatePhoneTime(){var d=new Date();$('#phoneTime').textContent=d.getHours()+':'+String(d.getMinutes()).padStart(2,'0')}setInterval(updatePhoneTime,1000);
function init(){buildKeypad();updatePhoneTime();updateStatusBar();updateDisplay();$('#startBtn').onclick=function(){state.running?stopTimer():startTimer()};$('#resetBtn').onclick=resetTimer;$('#quitZone').onclick=openHub;$('#emergencyBtn').onclick=toggleBrainHybridManualMode;if('serviceWorker' in navigator){navigator.serviceWorker.getRegistrations().then(function(regs){regs.forEach(function(reg){reg.unregister()})})}if(window.caches){caches.keys().then(function(keys){keys.forEach(function(k){caches.delete(k)})})}}
init();
</script>
</body>
</html>
